<style>
        body {
            background-color: #faf9f4;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-plus { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .emerald-glow:hover {
            box-shadow: 0 0 20px rgba(0, 106, 64, 0.2);
        }

        .auth-tab-active {
            color: #006a40;
            position: relative;
        }
        .auth-tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: #006a40;
        }

        .floating-input:focus-within label,
        .floating-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.25rem) scale(0.85);
            color: #006a40;
        }

        .bg-mesh {
            background: 
                radial-gradient(at 0% 0%, rgba(0, 106, 64, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(253, 188, 19, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 106, 64, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(253, 188, 19, 0.05) 0px, transparent 50%);
        }

        .transition-soft {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

<!-- Auth Card -->
<div class="glass-card rounded-xl p-lg space-y-lg shadow-2xl shadow-primary/5 border border-white/40">

<div class="flex items-center justify-center gap-xl border-b border-outline-variant/30 pb-sm"><button class="font-label-md text-primary auth-tab-active transition-soft px-4 py-2 relative" id="tab-signin" onclick="switchTab('signin')">Sign In</button><button class="font-label-md text-on-surface-variant hover:text-primary transition-soft px-4 py-2" id="tab-signup" onclick="switchTab('signup')">Sign Up</button></div>

<!-- Notification Micro-interaction -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 glass-card px-md py-sm rounded-full opacity-0 translate-y-10 transition-all duration-500 pointer-events-none flex items-center gap-xs" id="toast">
<span class="material-symbols-outlined text-primary text-[20px]">check_circle</span>
<span class="font-label-md text-on-surface">Welcome back to the field.</span>
</div>
<script>
        function switchTab(type) {
            const signin = document.getElementById('tab-signin');
            const signup = document.getElementById('tab-signup');
            const btn = document.querySelector('form button');

            if (type === 'signup') {
                signup.classList.add('auth-tab-active', 'text-primary');
                signup.classList.remove('text-on-surface-variant');
                signin.classList.remove('auth-tab-active', 'text-primary');
                signin.classList.add('text-on-surface-variant');
                btn.textContent = 'Create Account';
            } else {
                signin.classList.add('auth-tab-active', 'text-primary');
                signin.classList.remove('text-on-surface-variant');
                signup.classList.remove('auth-tab-active', 'text-primary');
                signup.classList.add('text-on-surface-variant');
                btn.textContent = 'Get Started';
            }
        }

        // Simple animation trigger for demo
        window.addEventListener('load', () => {
            const toast = document.getElementById('toast');
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-10');
                }, 3000);
            }, 1000);
        });

        // Floating label fix for pre-filled inputs
        document.querySelectorAll('.floating-input input').forEach(input => {
            input.addEventListener('change', (e) => {
                if (e.target.value) {
                    e.target.nextElementSibling.classList.add('scale-85', '-translate-y-5');
                }
            });
        });
    </script>
