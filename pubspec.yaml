name: brakshaa
description: AI-powered smart farming ecosystem converted from the Stitch Brakshaa UI export.
publish_to: "none"
version: 3.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^6.1.0
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.4.0
  firebase_auth: ^5.4.0
  firebase_core: ^3.10.0
  firebase_crashlytics: ^4.3.0
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.3.0
  firebase_messaging: ^15.2.0
  firebase_storage: ^12.4.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.5.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
